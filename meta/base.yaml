- defaults:
    link:
      relink: true
      create: true
      force: true
    shell:
      stdout: true
      stderr: true
    brewfile:
      stdout: true,
    brew:
      stderr: False,
      stdout: False,

- create:
    - $HOME/.config

- clean:
    $HOME:
      force: true
    $HOME/.config:
      recursive: true
